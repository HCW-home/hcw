site_name: HCW@Home Documentation
site_description: Documentation for HCW@Home V6 teleconsultation platform
site_url: https://hcw-at-home.com/docs

theme:
  name: material
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - scheme: default
      primary: white
      accent: teal
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy
  custom_dir: overrides

plugins:
  - search
  - mermaid2
  - i18n:
      languages:
        - locale: en
          name: English
          default: true
        - locale: fr
          name: Francais

nav:
  - Get Started:
    - Overview: index.md
    - Use Cases: use-cases.md
  - Deployment:
    - Docker Compose: deployment/docker-compose.md
    - Debian Packages: deployment/debian.md

extra_css:
  - assets/css/extra.css

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom
  - pymdownx.tabbed:
      alternate_style: true
  - tables
