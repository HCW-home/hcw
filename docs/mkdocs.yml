site_name: HCW@Home Documentation
site_description: Documentation for HCW@Home V6 teleconsultation platform
site_url: https://hcw-at-home.com/docs

theme:
  name: material
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - scheme: default
      primary: white
      accent: teal
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy

plugins:
  - search
  - mermaid2
  - i18n:
      languages:
        - locale: en
          name: English
          default: true
        - locale: fr
          name: Francais

nav:
  - Get Started:
    - Overview: index.md
    - Architecture: architecture.md
  - Use Cases:
    - Appointment Management: use-cases/appointment-management.md
    - Video Call Scheduling: use-cases/video-call-scheduling.md
    - Follow-up and Chat: use-cases/followup-chat.md
    - Slot Booking: use-cases/slot-booking.md
  - Administration:
    - Users: admin/users.md
    - Terms of Use: admin/terms.md
    - Organizations: admin/organizations.md
    - Messaging Providers: admin/messaging-providers.md
    - Media Servers: admin/media-servers.md
    - Consultation Reasons: admin/reasons.md
    - Single Sign-On (SSO): admin/sso.md
    - Advanced Options: admin/advanced-options.md
  - Deployment:
    - Docker Compose: deployment/docker-compose.md
    - Debian Packages: deployment/debian.md

extra_css:
  - assets/css/extra.css

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom
  - pymdownx.tabbed:
      alternate_style: true
  - tables
