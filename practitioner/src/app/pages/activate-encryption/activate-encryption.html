<div class="login-page">
  @if (loading) {
    <app-loader></app-loader>
  } @else {
    <div class="auth-card">
      <app-auth-branding />
      <div class="right-side">
        <div class="right-content">
          <form [formGroup]="form" (ngSubmit)="submit()" class="login-form">
            <app-typography
              color="var(--slate-800)"
              [variant]="TypographyTypeEnum['h6-semibold']">
              {{ 'activateEncryption.title' | translate }}
            </app-typography>
            <p class="onboarding-description">
              {{ 'activateEncryption.description' | translate }}
            </p>

            <div class="form-group">
              <label class="form-label">
                {{ 'activateEncryption.passphrase' | translate }}
                <span class="required">*</span>
              </label>
              <input
                type="password"
                class="form-input"
                formControlName="passphrase"
                autocomplete="off" />
              @if (newPassphraseShown()) {
                <p class="field-helper-text" style="color: var(--red-600); word-break: break-all">
                  {{ 'activateEncryption.newPassphrase' | translate }}: {{ newPassphraseShown() }}
                </p>
              } @else {
                <a href="javascript:void(0)" (click)="forgotPassphrase()" class="field-helper-text">
                  {{ 'activateEncryption.forgotLink' | translate }}
                </a>
              }
            </div>

            <app-button
              [type]="ButtonTypeEnum.submit"
              [block]="true"
              [style]="ButtonStyleEnum.primary"
              [text]="'activateEncryption.confirm' | translate"
              [loading]="saving()"
              [disabled]="form.invalid">
            </app-button>
          </form>
        </div>
      </div>
    </div>
  }
</div>
